<!doctype html>
<html lang="zh-CN" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=2560, height=1440" />
    <title>开场金句 - HyperFrames动态模板</title>
    <!-- 引入Google字体和GSAP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg-color: #121920;
        --text-color: #f3eee4;
        --muted-color: rgba(236, 231, 222, 0.78);
        --accent-color: #e7c992;
        --font-serif: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
        --font-sans: "Outfit", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        overflow: hidden;
        background: var(--bg-color);
        font-family: var(--font-sans);
        color: var(--text-color);
      }

      #root {
        position: relative;
        background: var(--bg-color);
        overflow: hidden;
      }

      /* 顶部 IP 栏 */
      .masthead {
        position: absolute;
        top: 52px;
        left: 58px;
        right: 58px;
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .ip-badge {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
      }

      .glow-dot-line {
        width: 32px;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(231, 201, 146, 0.08), rgba(231, 201, 146, 0.96));
        box-shadow: 0 0 12px rgba(231, 201, 146, 0.22);
      }

      .ip-name {
        font-size: 51px;
        font-weight: 600;
        letter-spacing: 3px;
        color: var(--muted-color);
        white-space: nowrap;
      }

      .divider-line {
        height: 1px;
        flex: 1;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.16), transparent);
        box-shadow: 0 0 18px rgba(231, 201, 146, 0.12);
        transform-origin: left;
      }

      /* 镜头推进容器 */
      #camera-rig {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        transform-origin: center center;
      }

      /* 金句文字定位容器 (动态对齐原 Remotion 布局机制) */
      .quote-container {
        position: absolute;
        left: 20px;
        right: 20px;
        top: 50%;
        text-align: center;
        font-family: var(--font-serif);
        display: flex;
        flex-direction: column;
      }

      .quote-line {
        line-height: 1.25;
        font-weight: 700;
        color: var(--text-color);
        text-shadow: 0 10px 28px rgba(0, 0, 0, 0.38);
        position: relative;
        display: block;
        width: fit-content;
        margin-left: auto;
        margin-right: auto;
        padding: 0 20px;
        overflow: hidden;
        white-space: nowrap;
        transform-origin: center center;
      }

      /* 扫光效果的斜切色块 */
      .sweep-bar {
        position: absolute;
        top: -8%;
        bottom: -8%;
        left: -24%;
        width: 36%;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 244, 213, 0.15) 30%,
          rgba(255, 244, 213, 0.6) 50%,
          rgba(255, 244, 213, 0.15) 70%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: translateX(-40%) skewX(-18deg);
        opacity: 0;
        mix-blend-mode: screen;
        pointer-events: none;
      }

      /* 关键词高亮呼吸灯 */
      .focused-word {
        --glow-scale: 0;
        --glow-base-opacity: 0;
        color: var(--accent-color);
        font-weight: 900;
        display: inline-block;
        background: linear-gradient(
          transparent 64%,
          rgba(231, 201, 146, calc((0.15 + 0.25 * var(--glow-scale)) * var(--glow-base-opacity))) 0
        );
        text-shadow: 0 0 calc(12px + 16px * var(--glow-scale))
          rgba(231, 201, 146, calc((0.15 + 0.3 * var(--glow-scale)) * var(--glow-base-opacity)));
        transform: scale(calc(1.01 + 0.02 * var(--glow-scale) * var(--glow-base-opacity)));
        margin: 0 2px;
      }

      /* 底部书名 */
      .book-title {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 96px;
        text-align: center;
        color: rgba(236, 231, 222, 0.8);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <!--
      data-composition-id="main": 对应主视频 composition
    -->
    <div id="root" data-composition-id="main" data-start="0">
      <!-- 顶部 IP 栏 -->
      <div id="masthead" class="masthead">
        <div class="ip-badge">
          <div class="glow-dot-line"></div>
          <div class="ip-name">Cody叩底</div>
        </div>
        <div id="divider-line" class="divider-line"></div>
      </div>

      <!-- 镜头推进容器 -->
      <div id="camera-rig">
        <div class="quote-container">
          <!-- 动态生成的金句将在此渲染 -->
        </div>
      </div>

      <!-- 底部书名 -->
      <div id="book-title" class="book-title"></div>
    </div>

    <script>
      // 1. 获取动态渲染参数 (兼容本地直接预览)
      const vars = (window.__hyperframes && window.__hyperframes.getVariables) 
        ? window.__hyperframes.getVariables() 
        : {};

      const bookTitle = vars.bookTitle || "—— 超级个体时代 ——";
      const ipName = vars.ipName || "Cody叩底";
      const quoteLines = vars.quoteLines || [
        "这个世界根本没有什么系统",
        "只有人与人之间的交易和强者定下的规则"
      ];
      const focusWords = vars.focusWords || ["系统", "规则"];
      const lineAppearTimes = vars.lineAppearTimes || [0.5, 1.25];
      const width = parseInt(vars.width || 2560);
      const height = parseInt(vars.height || 1440);
      const durationSeconds = parseFloat(vars.durationSeconds || 4);

      // 2. 动态自适应尺寸计算 (完全还原 Remotion 的适应性逻辑)
      const lineCount = Math.max(quoteLines.length, 1);
      const longestLine = quoteLines.reduce((max, line) => Math.max(max, line.length), 0);

      const maxByHeight = Math.round(height * 0.152);
      const maxByWidth = longestLine > 0
        ? Math.round((width * 0.94) / Math.max(longestLine, 1))
        : maxByHeight;
      const quoteFontSize = Math.max(88, Math.min(maxByHeight, maxByWidth, 122));
      const lineGap = Math.max(18, Math.round(quoteFontSize * 0.18));
      const bookFontSize = Math.max(54, Math.round(quoteFontSize * 0.54));
      const ipFontSize = Math.max(44, Math.round(quoteFontSize * 0.42));
      const quoteOffsetY = lineCount >= 4 ? -0.6 : lineCount >= 3 ? -0.56 : -0.53;

      // 3. 应用自适应布局样式与文字填充
      const root = document.getElementById("root");
      root.setAttribute("data-width", width);
      root.setAttribute("data-height", height);
      root.setAttribute("data-duration", durationSeconds);
      root.style.width = width + "px";
      root.style.height = height + "px";

      document.documentElement.style.width = width + "px";
      document.documentElement.style.height = height + "px";
      document.body.style.width = width + "px";
      document.body.style.height = height + "px";

      document.querySelector(".ip-name").textContent = ipName;
      document.querySelector(".ip-name").style.fontSize = ipFontSize + "px";

      const bookTitleEl = document.querySelector(".book-title");
      bookTitleEl.textContent = bookTitle;
      bookTitleEl.style.fontSize = bookFontSize + "px";
      bookTitleEl.style.letterSpacing = `${Math.max(1, Math.round(bookFontSize * 0.08))}px`;

      const quoteContainer = document.querySelector(".quote-container");
      quoteContainer.style.gap = lineGap + "px";
      quoteContainer.style.transform = `translateY(${quoteOffsetY * 100}%)`;

      // 4. 文字分词高亮函数
      function highlightLine(line, focusWords) {
        if (!focusWords || focusWords.length === 0) {
          return [{ text: line, focused: false }];
        }
        const escaped = focusWords
          .filter(Boolean)
          .map((word) => word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
        if (escaped.length === 0) {
          return [{ text: line, focused: false }];
        }
        const regex = new RegExp(`(${escaped.join("|")})`, "g");
        return line.split(regex).filter(Boolean).map((part) => ({
          text: part,
          focused: focusWords.includes(part),
        }));
      }

      // 渲染每一行的 HTML
      function createLineHtml(line, index, focusWords) {
        const parts = highlightLine(line, focusWords);
        let html = `<span id="sweep-${index}" class="sweep-bar"></span>`;
        parts.forEach(part => {
          if (part.focused) {
            html += `<span class="focused-word">${part.text}</span>`;
          } else {
            html += `<span>${part.text}</span>`;
          }
        });
        return html;
      }

      // 填充金句 DOM
      quoteLines.forEach((line, index) => {
        const div = document.createElement("div");
        div.id = `line-${index}`;
        div.className = "quote-line";
        div.style.fontSize = quoteFontSize + "px";
        div.innerHTML = createLineHtml(line, index, focusWords);
        quoteContainer.appendChild(div);
      });

      // 5. 构建 GSAP 动态动画时间轴
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 5.1. 摄像机缓慢镜头推进
      tl.to("#camera-rig", {
        scale: 1.06,
        duration: durationSeconds,
        ease: "none"
      }, 0);

      // 5.2. 顶部栏入场
      tl.from("#masthead", {
        opacity: 0,
        y: 10,
        duration: 0.8,
        ease: "power2.out"
      }, 0.08);

      tl.from("#divider-line", {
        scaleX: 0,
        duration: 0.64,
        ease: "power3.out"
      }, 0.08);

      // 5.3. 动态配置每一行文字的入场与扫光
      quoteLines.forEach((line, index) => {
        const lineAppearTime = lineAppearTimes[index] !== undefined 
          ? lineAppearTimes[index] 
          : (0.5 + index * 0.75);

        const lineId = `#line-${index}`;
        const sweepId = `#sweep-${index}`;

        // 文字弹性淡入
        tl.from(lineId, {
          opacity: 0,
          y: 40,
          scale: 1.1,
          duration: 0.8,
          ease: "back.out(1.2)"
        }, lineAppearTime);

        // 文字扫光反射
        tl.to(sweepId, {
          x: "340%",
          duration: 0.5,
          ease: "power3.out"
        }, lineAppearTime + 0.25);

        tl.fromTo(sweepId, 
          { opacity: 0 },
          {
            keyframes: [
              { opacity: 0.35, duration: 0.1 },
              { opacity: 0.3, duration: 0.25 },
              { opacity: 0, duration: 0.15 }
            ],
            ease: "none"
          }, 
          lineAppearTime + 0.25
        );
      });

      // 5.4. 高亮词呼吸灯渐入 (在最后一行出场后 0.15s 开始)
      const lastLineAppearTime = lineAppearTimes[lineAppearTimes.length - 1] || 1.25;
      tl.to(".focused-word", {
        "--glow-base-opacity": 1,
        duration: 1.1,
        ease: "power1.out"
      }, lastLineAppearTime + 0.15);

      // 5.5. 底部书名淡入
      tl.from("#book-title", {
        opacity: 0,
        y: 12,
        duration: 1.0,
        ease: "power3.out"
      }, lastLineAppearTime + 0.55);

      // 注册主时间轴
      window.__timelines["main"] = tl;

      // 6. 开启无限循环呼吸灯
      gsap.to(".focused-word", {
        "--glow-scale": 1,
        duration: 1.2,
        yoyo: true,
        repeat: -1,
        ease: "sine.inOut"
      });
    </script>
  </body>
</html>
