style01: "极简主义摄影，结合巴洛克风格；三分法构图，有纵深感，有留白；主色调为柔和的白色、黑色和金色；若出现人物元素，需统一使用黑色剪影；字体为宋体。"
style02: "莫奈风格，营造温馨治愈；三分法构图，画面简约；柔和光线，浅暖色调为主，明度中等；字体为宋体。"
style03: "爱德华·霍普的风格；三分法构图，近景构图，有纵深感、深邃感；字体为素色宋体。"
style04: "CG动画风格；经典构图法，近景构图，画面元素简单；使用浅橘、棕黄、橄榄和深褐色；字体为宋体。"
style05: "CG动画风格，科幻风格的景观；三分法，远景构图，画面元素简单；使用饱和的蓝绿色与金黄色；字体为宋体。"
style06: "高级政论杂志手绘插画风格（类似The Economist）；画面留白丰富，具备强烈的隐喻感；色彩克制，黑白灰基调配合单一高饱和亮色点缀；数据图表化作具象的阶梯、天平等纸质手绘元素；无数据画面则用简单线条表现人物与科技的博弈；字体为宋体。"
style07: "电影精致写实风格，有深邃的冲击感；三分法，中景构图，有大量留白，线条简单，有氛围感；色彩简单，高清画面；字体为宋体。"
style08: "宫崎骏风格；三分法，中景构图，有大量留白，有氛围感；色彩简单，高清画面；字体为宋体。"
style09: "新海诚风格；三分法，中景构图，有大量留白，有氛围感；色彩简单，高清画面；字体为宋体。"
style10: "水墨画，大约3种颜色，有色彩点缀不单调；三分法构图，巨大的留白，有纵深感、史诗感；字体为素色宋体。"
